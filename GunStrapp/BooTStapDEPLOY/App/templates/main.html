{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Объявления</title>
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

<img src="{% static 'images/images.jpg' %}" alt="Фото" style="max-width:400px;">
    <h1>Объявления</h1>

    {% if ads %}
        {% for ad in ads %}
            <div>
                <h2>
                    <a href="{% url 'ad_detail' ad.pk %}">{{ ad.name }}</a>
                </h2>
                <p><strong>Категория:</strong> {{ ad.category.name }}</p>
                <p>{{ ad.description }}</p>
            </div>
            <hr>
        {% endfor %}
    {% else %}
        <p>нет объявлений</p>
    {% endif %}
</body>
</html>
