version: "3.9"

services:
  web:
    build: .
    restart: always
    volumes:
      - static_volume:/app/static
    depends_on: []

  nginx:
    image: nginx:1.25
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
    static_volume: